<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>我的视频集</title>
        <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* 设置根字体基准，统一跨浏览器渲染 */
    html {
        font-size: 16px;
    }

    /* 整体页面：暖橙黄 + 国风淡雅纹理 */
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #fff4e5, #ffd9a7);
        background-attachment: fixed;
        color: #333;
        line-height: 1.6;
        position: relative;
    }

    body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("https://picsum.photos/id/175/2000/2000");
        background-size: cover;
        opacity: 0.05;
        z-index: -1;
    }

    header {
        text-align: center;
        padding: 3rem 1rem;
        background: linear-gradient(135deg, #ff9f43, #ff7675);
        color: #fff;
    }

    header h1 {
        font-size: 2rem;
        margin-bottom: 0.5rem;
    }

    header p {
        color: rgba(255,255,255,0.9);
        font-size: 1rem;
    }

    .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 1rem;
    }

    .video-card, .download-card {
        border-radius: 16px;
        overflow: hidden;
        margin-bottom: 2rem;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
    }

    .video-card {
        background: #fff;
    }

    .video-container {
        position: relative;
        padding-bottom: 56.25%;
        height: 0;
    }

    .video-container video,
    .video-container iframe {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        object-fit: cover;
    }

    .video-cover {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: url(cover2.jpg) center/cover;
        cursor: pointer;
        z-index: 5;
    }

    .play-btn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 70px;
        height: 70px;
        background: rgba(255,255,255,0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(10px);
    }
    .play-btn::after {
        content: "";
        width: 0;
        height: 0;
        margin-left: 6px;
        border-top: 16px solid transparent;
        border-bottom: 16px solid transparent;
        border-left: 26px solid #fff;
    }

    .fullscreen-btn {
        position: absolute;
        bottom: 12px;
        right: 12px;
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        border: none;
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 12px;
        cursor: pointer;
        z-index: 10;
    }

    .fullscreen-btn:hover {
        background: rgba(0, 0, 0, 0.8);
    }

    .download-card {
        position: relative;
        padding-bottom: 56.25%;
        height: 0;
        background: url(download-bg.jpg) center/cover;
        overflow: hidden;
    }

    /* 半透明遮罩，更淡，能看清背景 */
    .download-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.25);
        z-index: 0;
    }

    .download-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100%;
        padding: 0 1rem;
        text-align: center;
        z-index: 1;
    }

    /* 32px → 1.75rem，亮黄色 */
    .download-card h2 {
        font-size: 1.75rem;
        color: #ffff00;
        margin-bottom: 1rem;
        text-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }

    /* 24px → 1.5rem，红色 */
    .download-card p {
        font-size: 1.5rem;
        color: #ff0000;
        margin-bottom: 1.5rem;
        text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }

    .download-btn {
        display: inline-block;
        padding: 24px 36px;
        background: #ff5e57;
        color: #fff;
        text-decoration: none;
        border-radius: 10px;
        font-size: 1.1rem;
        transition: 0.3s;
    }

    .download-btn:hover {
        background: #ff3838;
        transform: translateY(-2px);
    }

    footer {
        text-align: center;
        padding: 2rem 1rem;
        color: #888;
        font-size: 0.9rem;
    }
    </style>
    </head>
    <body>
        <header>
            <h1>我的视频集</h1>
            <p>生活片段 · 美好记录</p>
        </header>
        <div class="container">
            <div class="video-card">
                <div class="video-container">
                    <video id="v1" controls playsinline allowfullscreen poster="cover1.jpg"><source src="你咋那么美.m3u8" type="video/mp4"> 您的浏览器不支持播放视频
                    </video> <button class="fullscreen-btn" onclick="goFull('v1')">全屏</button>
                </div>
            </div>
            <div class="download-card">
                <div class="download-content">
                    <h2>遇岩同乐 App</h2>
                    <p>内置大图标，适配手机端，点击下方按钮下载安装</p> <a class="download-btn" href="https://gitee.com/x21y/an/releases/download/YaX5.1.9手机/YaX_5.1.9.apk" download> 下载遇岩同乐 v5.1.9 </a>
                </div>
            </div>
        </div>
        <footer>
            © 2026 我的视频站
        </footer>
        <script>
    function goFull(id) {
        const v = document.getElementById(id);
        if (v.requestFullscreen) v.requestFullscreen();
        else if (v.webkitRequestFullscreen) v.webkitRequestFullscreen();
        else if (v.msRequestFullscreen) v.msRequestFullscreen();
    }

    function playBilibili(cover) {
        const iframe = document.getElementById('bili-iframe');
        iframe.src = iframe.src.replace('&autoplay=0', '&autoplay=1');
        cover.style.display = 'none';
    }
    </script>
    </body>
</html>
